app-id: io.github.kischang.zenssh

runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk

command: ZenSSH

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network

modules:
  - name: ZenSSH
    buildsystem: simple

    sources:
      - type: file
        path: ./src-tauri/target/release/bundle/deb/ZenSSH_0.3.2_amd64.deb
      - type: file
        path: ./io.github.kischang.zenssh.metainfo.xml

    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/ZenSSH /app/bin/ZenSSH
      - install -Dm644 usr/share/applications/ZenSSH.desktop /app/share/applications/io.github.kischang.zenssh.desktop
      - install -Dm644 usr/share/icons/hicolor/128x128/apps/ZenSSH.png \
        /app/share/icons/hicolor/128x128/apps/io.github.kischang.zenssh.png
      - install -Dm644 io.github.kischang.zenssh.metainfo.xml\
        /app/share/metainfo/io.github.kischang.zenssh.metainfo.xml

